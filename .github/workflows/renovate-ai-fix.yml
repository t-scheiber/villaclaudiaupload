name: Renovate AI Fix

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: renovate-ai-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  renovate-ai-fix:
    if: github.actor == 'renovate[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout Renovate branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.RENOVATE_TOKEN }}

      - name: Checkout shared Renovate config
        uses: actions/checkout@v6
        with:
          repository: t-scheiber/renovate-config
          ref: main
          path: .renovate-config
          token: ${{ secrets.RENOVATE_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Renovate update
        id: validate
        continue-on-error: true
        run: |
          set -o pipefail
          {
            echo '$ npm run lint'
            npm run lint
            echo
            echo '$ npm run build'
            npm run build
          } 2>&1 | tee renovate-validation.log

      - name: Run Gemini fixer
        if: steps.validate.outcome != 'success' || contains(github.event.pull_request.labels.*.name, 'ai-fix') || contains(github.event.pull_request.labels.*.name, 'renovate-major')
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node .renovate-config/scripts/ai-renovate-fix.mjs --log renovate-validation.log --command "npm run lint" --command "npm run build"

      - name: Commit and push AI repair
        if: steps.validate.outcome != 'success' || contains(github.event.pull_request.labels.*.name, 'ai-fix') || contains(github.event.pull_request.labels.*.name, 'renovate-major')
        run: |
          rm -f .renovate-ai-fix-*.patch renovate-ai-validation-*.log renovate-validation.log
          rm -rf .renovate-config
          if [ -z "$(git status --porcelain)" ]; then
            echo "No repair changes to push."
            exit 0
          fi
          git config user.name "Renovate AI Fixer"
          git config user.email "renovate-ai-fixer@users.noreply.github.com"
          git add -A
          git commit -m "chore: apply Gemini fix for Renovate update"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Enable auto-merge
        if: steps.validate.outcome == 'success' && contains(github.event.pull_request.labels.*.name, 'renovate-automerge')
        env:
          GH_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
